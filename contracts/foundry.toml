[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "paris"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
flow_testnet = "https://testnet.evm.nodes.onflow.org"
flow_mainnet = "https://mainnet.evm.nodes.onflow.org"

[etherscan]
flow_testnet = { key = "", url = "https://evm-testnet.flowscan.io/api" }
flow_mainnet = { key = "", url = "https://evm.flowscan.io/api" }
